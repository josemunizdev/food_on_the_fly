# Hydra configuration for Food on the Fly
defaults:
  - _self_

model:
  name: xgboost_delivery_predictor                     
  type: xgboost                                        
  parameters:                                          
    n_estimators: 100                               
    max_depth: 6                            
    learning_rate: 0.1                       
    objective: 'reg:squarederror'            
    random_state: 42

mlflow:                                                
  tracking_uri: "file:./mlruns"               
  experiment_name: "food_delivery_prediction" 
  run_name: "xgboost_baseline"

data:
  raw_path: data/raw
  processed_path: data/processed
  train_test_split: 0.8
  random_state: 42
  val_split: 0.1

features:                                              
  haversine:
    lat_col1: Restaurant_latitude
    lon_col1: Restaurant_longitude
    lat_col2: Delivery_location_latitude
    lon_col2: Delivery_location_longitude                                        
    

training:
  epochs: 100
  batch_size: 32
  learning_rate: 0.001
  optimizer: adam
  loss_function: mse
  early_stopping: true
  early_stopping_patience: 10

evaluation:
  metrics:
    - mse
    - rmse
    - mae
  cv_folds: 5

logging:
  level: INFO
  output_dir: logs

paths:
  models_dir: models
  logs_dir: logs
  predictions_dir: predictions


