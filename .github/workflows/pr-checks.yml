name: PR checks

on:
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  branch-policy:
    name: Branch policy
    runs-on: ubuntu-latest
    steps:
      - name: Enforce merge direction and branch naming
        run: |
          TARGET="${{ github.base_ref }}"
          SOURCE="${{ github.head_ref }}"

          echo "Source branch: $SOURCE"
          echo "Target branch: $TARGET"

          if [ "$TARGET" = "main" ]; then
            if [ "$SOURCE" != "dev" ]; then
              echo "::error::PRs into main must come from dev. This PR is from: $SOURCE"
              echo "Either retarget the PR to dev, or merge dev into main instead."
              exit 1
            fi
            echo "OK: dev -> main is allowed."
          elif [ "$TARGET" = "dev" ]; then
            if [[ ! "$SOURCE" =~ ^(feature|fix)/.+ ]]; then
              echo "::error::PRs into dev must come from a branch named feature/<name> or fix/<name>. This PR is from: $SOURCE"
              echo "Rename your branch with: git branch -m feature/<descriptive-name>"
              exit 1
            fi
            echo "OK: $SOURCE -> dev is allowed."
          fi

  lint-and-test:
    name: Lint and test
    needs: branch-policy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Format check with ruff
        run: ruff format --check .

      - name: Install project
        run: pip install -e .

      - name: Type check with mypy
        run: mypy src

      - name: Run tests with pytest
        run: pytest tests/ --cov=food_on_the_fly --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
